search:
  keywords:
    - assistente administrativo
    - assistente contabilidade
    - analista dados
    - gestor dados
    - técnico informática

scoring:
  rules:
    # High signal — technical skills you can deliver
    python: 10
    sql: 9
    powerbi: 8
    power bi: 8        # people write it both ways
    tableau: 8
    excel: 6
    vba: 7             # Excel automation — high pain point

    # Medium signal — context indicators
    dados: 5
    data: 5
    automação: 6
    automatizar: 6
    relatórios: 5
    reporting: 5
    dashboard: 6
    contabilidade: 4

    # Work style — increases client quality signal
    remoto: 6
    "home office": 6
    híbrido: 4
    freelance: 7
    projeto: 5
    recibo verde: 6    # contractor billing — relevant for freelance

    # Urgency signals — faster conversion
    urgente: 4
    imediato: 4
    "início imediato": 5

    # Soft signals — lower weight
    proativo: 3
    proactivo: 3
    organizado: 2
    administrativo: 2
    assistente: 2

alerts:
  min_score: 15

schedule:
  interval_minutes: 30